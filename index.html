<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Control de Fumigaciones y Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col">

    <header class="bg-blue-700 text-white shadow-md p-4">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-bold tracking-wide">🕷️ Gestión de Fumigaciones y Agenda</h1>
            <nav class="flex space-x-2">
                <button id="btn-registro" class="px-4 py-2 rounded bg-blue-900 font-semibold transition" onclick="cambiarPestana('registro')">Nuevo Registro</button>
                <button id="btn-consulta" class="px-4 py-2 rounded hover:bg-blue-600 font-semibold transition" onclick="cambiarPestana('consulta')">Consultar Clientes / Citas</button>
            </nav>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4 max-w-6xl mt-6">
        
        <!-- PESTAÑA 1: FORMULARIO CLIENTE -->
        <div id="vista-registro" class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Registrar Servicio / Cliente</h2>
            <form id="form-registro" onsubmit="guardarDatos(event)">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Consecutivo</label>
                        <input type="text" id="consecutivo" value="Automático" readonly class="w-full p-2 border rounded-lg bg-gray-100 text-gray-500 cursor-not-allowed outline-none font-bold">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Nombre Completo *</label>
                        <input type="text" id="nombre" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Cédula *</label>
                        <input type="text" id="cedula" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Sucursal</label>
                        <input type="text" id="sucursal" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Teléfono</label>
                        <input type="tel" id="telefono" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Email</label>
                        <input type="email" id="email" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Fecha Registro *</label>
                        <input type="date" id="fechaRegistro" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Frecuencia de Fumigación</label>
                        <select id="frecuencia" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">Seleccione una opción...</option>
                            <option value="Semanal">Semanal</option>
                            <option value="Quincenal">Quincenal</option>
                            <option value="Mensual">Mensual</option>
                            <option value="Bimensual">Bimensual</option>
                            <option value="Trimestral">Trimestral</option>
                            <option value="Semestral">Semestral</option>
                            <option value="Anual">Anual</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Coordenadas GPS</label>
                        <div class="flex gap-2">
                            <input type="text" id="gps" placeholder="Latitud, Longitud" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <button type="button" onclick="obtenerGPS('gps')" class="bg-blue-100 text-blue-700 px-3 rounded-lg hover:bg-blue-200 transition text-xl">📍</button>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Dirección Exacta</label>
                        <textarea id="direccion" rows="2" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Provincia, Cantón, Distrito..."></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Comentarios / Observaciones Internas</label>
                        <textarea id="comentarios" rows="2" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Detalles del lugar, mascotas, tipo de veneno preferido..."></textarea>
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-700 text-white p-3 rounded-lg font-bold hover:bg-blue-800 transition shadow-lg text-lg">💾 Guardar Registro</button>
            </form>
            <div id="status-registro" class="mt-4 hidden text-center font-semibold p-3 rounded-lg"></div>
        </div>

        <!-- PESTAÑA 2: CONSULTA -->
        <div id="vista-consulta" class="bg-white p-6 rounded-xl shadow-md border border-gray-200 hidden">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 border-b pb-2">Consultar Base de Datos</h2>
            <div class="flex flex-col sm:flex-row mb-6 gap-2">
                <input type="text" id="busqueda" placeholder="Buscar por Nombre, Cédula o Sucursal..." class="flex-grow p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                <button onclick="buscarDatos()" class="bg-emerald-600 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-emerald-700 transition shadow">🔍 Buscar</button>
            </div>
            
            <div class="overflow-x-auto">
                <table class="w-full table-auto border-collapse text-left min-w-[1200px]">
                    <thead>
                        <tr class="bg-gray-100 text-gray-700 text-xs uppercase font-bold border-b border-gray-200">
                            <th class="p-2">Consec.</th>
                            <th class="p-2">Nombre Completo</th>
                            <th class="p-2">Cédula</th>
                            <th class="p-2">Sucursal</th>
                            <th class="p-2">Teléfono</th>
                            <th class="p-2">Dirección / GPS</th>
                            <th class="p-2">Comentarios</th>
                            <th class="p-2">Frec. Fumigación</th>
                            <th class="p-2 text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-resultados" class="text-gray-600 text-sm divide-y divide-gray-100">
                        <tr><td colspan="9" class="p-4 text-center text-gray-400">Haz clic en "Buscar" para cargar.</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL 1: EDITAR REGISTRO -->
    <div id="modal-editar" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full p-6 overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-xl font-bold text-gray-800">✏️ Editar Registro N° <span id="edit-consecutivo-titulo"></span></h3>
                <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600 font-bold text-2xl">×</button>
            </div>
            <form id="form-editar" onsubmit="actualizarDatos(event)">
                <input type="hidden" id="edit-consecutivo">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Nombre Completo *</label>
                        <input type="text" id="edit-nombre" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Cédula *</label>
                        <input type="text" id="edit-cedula" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Sucursal</label>
                        <input type="text" id="edit-sucursal" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Teléfono</label>
                        <input type="tel" id="edit-telefono" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Email</label>
                        <input type="email" id="edit-email" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Fecha Registro *</label>
                        <input type="date" id="edit-fechaRegistro" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Frecuencia de Fumigación</label>
                        <select id="edit-frecuencia" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                            <option value="">Seleccione una opción...</option>
                            <option value="Semanal">Semanal</option>
                            <option value="Quincenal">Quincenal</option>
                            <option value="Mensual">Mensual</option>
                            <option value="Bimensual">Bimensual</option>
                            <option value="Trimestral">Trimestral</option>
                            <option value="Semestral">Semestral</option>
                            <option value="Anual">Anual</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Coordenadas GPS</label>
                        <div class="flex gap-2">
                            <input type="text" id="edit-gps" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <button type="button" onclick="obtenerGPS('edit-gps')" class="bg-blue-100 text-blue-700 px-3 rounded-lg hover:bg-blue-200 transition text-xl">📍</button>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Dirección Exacta</label>
                        <textarea id="edit-direccion" rows="2" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Comentarios / Observaciones</label>
                        <textarea id="edit-comentarios" rows="2" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                    </div>
                </div>
                <div class="flex justify-end gap-2 border-t pt-3">
                    <button type="button" onclick="cerrarModal()" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-400 transition">Cancelar</button>
                    <button type="submit" class="bg-blue-700 text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-800 transition shadow">💾 Actualizar Cambios</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL 2: AGENDAR EN GOOGLE CALENDAR -->
    <div id="modal-calendar" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-lg w-full p-6">
            <div class="flex justify-between items-center border-b pb-3 mb-4">
                <h3 class="text-xl font-bold text-gray-800">📅 Agendar Cita de Calendar</h3>
                <button onclick="cerrarModalCalendar()" class="text-gray-400 hover:text-gray-600 font-bold text-2xl">×</button>
            </div>
            <form id="form-calendar" onsubmit="crearEventoCalendar(event)">
                <div class="mb-3">
                    <label class="block text-gray-700 text-sm font-semibold mb-1">Título del Evento *</label>
                    <input type="text" id="cal-titulo" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Inicio Cita *</label>
                        <input type="datetime-local" id="cal-inicio" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-gray-700 text-sm font-semibold mb-1">Fin Cita *</label>
                        <input type="datetime-local" id="cal-fin" required class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>
                
                <!-- NUEVO CAMPO: COMENTARIOS DE LA CITA ACTUAL -->
                <div class="mb-3">
                    <label class="block text-blue-700 text-sm font-bold mb-1">✍️ Notas o Comentarios Adicionales de esta Cita</label>
                    <input type="text" id="cal-comentario-cita" oninput="actualizarDetalleDinamico()" placeholder="Ej. Llevar bomba grande, cliente pagará en efectivo..." class="w-full p-2 border border-blue-400 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-blue-50">
                </div>

                <div class="mb-4">
                    <label class="block text-gray-500 text-xs font-semibold mb-1">Vista previa del Detalle Final (Se enviará a Calendar):</label>
                    <textarea id="cal-descripcion" rows="6" class="w-full p-2 border rounded-lg bg-gray-100 text-xs text-gray-600 font-mono outline-none cursor-not-allowed" readonly></textarea>
                </div>
                <div class="flex justify-end gap-2 border-t pt-3">
                    <button type="button" onclick="cerrarModalCalendar()" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg font-bold hover:bg-gray-400 transition">Cancelar</button>
                    <button type="submit" id="btn-submit-calendar" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 transition shadow">🗓️ Crear Cita</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwRAZUcR0xg7na4FQN3257DRQKUmBvh9w_dlGQ_DFPY4bpPEVfW8-n6SbhiLnrnpRMw/exec";
        let datosTemporales = []; 
        let clienteSeleccionadoParaCita = null;

        document.getElementById('fechaRegistro').valueAsDate = new Date();

        function cambiarPestana(pestana) {
            if(pestana === 'registro') {
                document.getElementById('vista-registro').classList.remove('hidden');
                document.getElementById('vista-consulta').classList.add('hidden');
                document.getElementById('btn-registro').classList.add('bg-blue-900');
                document.getElementById('btn-consulta').classList.remove('bg-blue-900');
            } else {
                document.getElementById('vista-registro').classList.add('hidden');
                document.getElementById('vista-consulta').classList.remove('hidden');
                document.getElementById('btn-registro').classList.remove('bg-blue-900');
                document.getElementById('btn-consulta').classList.add('bg-blue-900');
                buscarDatos(); 
            }
        }

        function obtenerGPS(campoId) {
            const inputGps = document.getElementById(campoId);
            inputGps.value = "Obteniendo...";
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => { inputGps.value = position.coords.latitude + ", " + position.coords.longitude; },
                    (error) => { alert("Verifica los permisos de ubicación."); inputGps.value = ""; }
                );
            } else { alert("Geolocalización no soportada."); }
        }

        function guardarDatos(event) {
            event.preventDefault();
            const status = document.getElementById('status-registro');
            status.className = "mt-4 text-center font-semibold p-3 rounded-lg bg-blue-100 text-blue-800 block";
            status.innerText = "⏳ Guardando registro en la hoja de cálculo...";

            const params = new URLSearchParams({
                accion: "registrar",
                nombre: document.getElementById('nombre').value,
                cedula: document.getElementById('cedula').value,
                sucursal: document.getElementById('sucursal').value,
                telefono: document.getElementById('telefono').value,
                email: document.getElementById('email').value,
                direccion: document.getElementById('direccion').value,
                gps: document.getElementById('gps').value,
                fechaRegistro: document.getElementById('fechaRegistro').value,
                frecuencia: document.getElementById('frecuencia').value,
                comentarios: document.getElementById('comentarios').value
            });

            fetch(`${API_URL}?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    status.className = "mt-4 text-center font-semibold p-3 rounded-lg bg-green-100 text-green-800 block";
                    status.innerText = "✅ ¡Guardado con éxito! Se asignó el Consecutivo N° " + data.consecutivoAsignado;
                    document.getElementById('form-registro').reset();
                    document.getElementById('fechaRegistro').valueAsDate = new Date();
                } else { throw new Error(data.error); }
            })
            .catch(err => {
                status.className = "mt-4 text-center font-semibold p-3 rounded-lg bg-red-100 text-red-800 block";
                status.innerText = "❌ Error al intentar guardar.";
            });
        }

        function buscarDatos() {
            const query = document.getElementById('busqueda').value;
            const tbody = document.getElementById('tabla-resultados');
            tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-center text-blue-500 font-bold">⏳ Descargando base de datos...</td></tr>';

            fetch(`${API_URL}?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                tbody.innerHTML = "";
                datosTemporales = data; 
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-center text-gray-500">No se encontraron registros.</td></tr>';
                    return;
                }
                
                data.reverse().forEach((item) => {
                    let fechaMostrada = item.fechaRegistro || '';
                    if(fechaMostrada && typeof fechaMostrada === 'string' && fechaMostrada.includes('T')) {
                        fechaMostrada = new Date(item.fechaRegistro).toLocaleDateString('es-ES');
                    }
                    let gpsHtml = item.gps ? `<br><a href="http://googleusercontent.com/maps.google.com/?q=${encodeURIComponent(item.gps)}" target="_blank" class="text-blue-500 underline text-xs">📍 Ver Mapa</a>` : '';

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition border-b border-gray-100";
                    
                    tr.innerHTML = `
                        <td class="p-2 font-mono text-xs text-gray-500">${item.consecutivo || ''}</td>
                        <td class="p-2 font-bold text-gray-800">${item.nombre || ''}<br><span class="text-xs font-normal text-gray-500">Reg: ${fechaMostrada}</span></td>
                        <td class="p-2">${item.cedula || ''}</td>
                        <td class="p-2"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">${item.sucursal || '-'}</span></td>
                        <td class="p-2 text-sm">${item.telefono || ''}<br><span class="text-xs text-gray-400">${item.email || ''}</span></td>
                        <td class="p-2 text-xs max-w-[180px] truncate" title="${item.direccion || ''}">${item.direccion || ''}${gpsHtml}</td>
                        <td class="p-2 text-xs text-gray-500 italic max-w-[150px] truncate" title="${item.comentarios || ''}">${item.comentarios || '-'}</td>
                        <td class="p-2"><span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-xs font-bold">${item.frecuencia || 'No def.'}</span></td>
                        <td class="p-2">
                            <div class="flex flex-col gap-1 items-center">
                                <button onclick="abrirModalEditar(${item.consecutivo})" class="w-full bg-blue-600 text-white px-2 py-1 rounded font-semibold text-xs hover:bg-blue-700 transition shadow">✏️ Editar</button>
                                <button onclick="abrirModalCalendar(${item.consecutivo})" class="w-full bg-indigo-600 text-white px-2 py-1 rounded font-semibold text-xs hover:bg-indigo-700 transition shadow">📅 Agenda</button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            })
            .catch(err => {
                tbody.innerHTML = '<tr><td colspan="9" class="p-4 text-center text-red-500 font-semibold">❌ Error de conexión o permisos en Google Script.</td></tr>';
            });
        }

        function abrirModalEditar(consecutivo) {
            const cliente = datosTemporales.find(item => item.consecutivo == consecutivo);
            if (!cliente) return;

            document.getElementById('edit-consecutivo').value = cliente.consecutivo;
            document.getElementById('edit-consecutivo-titulo').innerText = cliente.consecutivo;
            document.getElementById('edit-nombre').value = cliente.nombre || '';
            document.getElementById('edit-cedula').value = cliente.cedula || '';
            document.getElementById('edit-sucursal').value = cliente.sucursal || '';
            document.getElementById('edit-telefono').value = cliente.telefono || '';
            document.getElementById('edit-email').value = cliente.email || '';
            document.getElementById('edit-direccion').value = cliente.direccion || '';
            document.getElementById('edit-gps').value = cliente.gps || '';
            document.getElementById('edit-comentarios').value = cliente.comentarios || '';
            
            if(cliente.fechaRegistro) {
                if(cliente.fechaRegistro.includes('T')) {
                    document.getElementById('edit-fechaRegistro').value = cliente.fechaRegistro.split('T')[0];
                } else if(cliente.fechaRegistro.includes('/')) {
                    const parts = cliente.fechaRegistro.split('/');
                    if(parts[2] && parts[2].length === 4) {
                        document.getElementById('edit-fechaRegistro').value = parts[2] + "-" + parts[1].padStart(2,'0') + "-" + parts[0].padStart(2,'0');
                    }
                }
            }
            document.getElementById('edit-frecuencia').value = cliente.frecuencia || '';

            document.getElementById('modal-editar').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modal-editar').classList.add('hidden');
        }

        function actualizarDatos(event) {
            event.preventDefault();

            const params = new URLSearchParams({
                accion: "editar",
                consecutivo: document.getElementById('edit-consecutivo').value,
                nombre: document.getElementById('edit-nombre').value,
                cedula: document.getElementById('edit-cedula').value,
                sucursal: document.getElementById('edit-sucursal').value,
                telefono: document.getElementById('edit-telefono').value,
                email: document.getElementById('edit-email').value,
                direccion: document.getElementById('edit-direccion').value,
                gps: document.getElementById('edit-gps').value,
                fechaRegistro: document.getElementById('edit-fechaRegistro').value,
                frecuencia: document.getElementById('edit-frecuencia').value,
                comentarios: document.getElementById('edit-comentarios').value
            });

            fetch(`${API_URL}?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert("✅ ¡Registro modificado con éxito en Google Sheets!");
                    cerrarModal();
                    buscarDatos(); 
                } else { alert("❌ Error: " + (data.error || "No se pudo actualizar")); }
            })
            .catch(err => {
                console.error(err);
                alert("❌ Error de conexión al intentar actualizar.");
            });
        }

        // ==========================================
        // CALENDARIO COMPLEMENTARIO ACTUALIZADO
        // ==========================================
        function abrirModalCalendar(consecutivo) {
            const cliente = datosTemporales.find(item => item.consecutivo == consecutivo);
            if (!cliente) return;

            clienteSeleccionadoParaCita = cliente; // Guardamos la referencia global
            document.getElementById('cal-comentario-cita').value = ""; // Limpiar campo nuevo

            document.getElementById('cal-titulo').value = "Fumigación: " + (cliente.nombre || '') + " (" + (cliente.sucursal || 'Principal') + ")";
            
            // Renderizar la vista previa inicial
            actualizarDetalleDinamico();

            const ahora = new Date();
            ahora.setMinutes(0);
            const formatoInicio = ahora.toISOString().slice(0, 16);
            ahora.setHours(ahora.getHours() + 1);
            const formatoFin = ahora.toISOString().slice(0, 16);

            document.getElementById('cal-inicio').value = formatoInicio;
            document.getElementById('cal-fin').value = formatoFin;

            document.getElementById('modal-calendar').classList.remove('hidden');
        }

        // Esta función actualiza dinámicamente el bloque de detalles combinando los datos fijos del cliente y lo que escribas en el campo azul
        function actualizarDetalleDinamico() {
            if (!clienteSeleccionadoParaCita) return;
            
            const comentarioDeEstaCita = document.getElementById('cal-comentario-cita').value;

            document.getElementById('cal-descripcion').value = 
                "Cliente: " + (clienteSeleccionadoParaCita.nombre || '') + "\n" +
                "Teléfono: " + (clienteSeleccionadoParaCita.telefono || 'No indicado') + "\n" +
                "Dirección: " + (clienteSeleccionadoParaCita.direccion || 'No indicada') + "\n" +
                "GPS: " + (clienteSeleccionadoParaCita.gps || '') + "\n" +
                "-----------------------------------------\n" +
                "COMENTARIO DE ESTA CITA: " + (comentarioDeEstaCita || 'Ninguno') + "\n" +
                "-----------------------------------------\n" +
                "OBSERVACIONES FIJAS: " + (clienteSeleccionadoParaCita.comentarios || 'Ninguna registrada.');
        }

        function cerrarModalCalendar() {
            document.getElementById('modal-calendar').classList.add('hidden');
            clienteSeleccionadoParaCita = null;
        }

        function crearEventoCalendar(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-submit-calendar');
            btn.disabled = true;
            btn.innerText = "⏳ Creando...";

            const params = new URLSearchParams({
                accion: "agendar_evento",
                titulo: document.getElementById('cal-titulo').value,
                inicio: document.getElementById('cal-inicio').value,
                fin: document.getElementById('cal-fin').value,
                descripcion: document.getElementById('cal-descripcion').value
            });

            fetch(`${API_URL}?${params.toString()}`)
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "🗓️ Crear Cita";
                if(data.status === "success") {
                    alert("📅 ¡Cita añadida con éxito a tu Google Calendar principal con todas sus notas!");
                    cerrarModalCalendar();
                } else { alert("❌ Error: " + data.error); }
            })
            .catch(err => {
                console.error(err);
                btn.disabled = false;
                btn.innerText = "🗓️ Crear Cita";
                alert("❌ Ocurrió un error al procesar el evento.");
            });
        }
    </script>
</body>
</html>
