<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TecnoPlagas Pro v24.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #1e272e; --accent: #05c46b; }
        body { background: #f1f2f6; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; }
        .card { border-radius: 10px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; padding: 20px; background: #fff; }
        .nav-link { color: #57606f; font-weight: bold; cursor: pointer; }
        .nav-pills .nav-link.active { background-color: var(--primary); color: white !important; }
        .form-label { font-weight: 700; font-size: 0.75rem; text-transform: uppercase; color: #57606f; margin-top: 5px; }
        .readonly-cons { background: #fffaf0 !important; color: #ff4757; font-weight: bold; border: 1px solid #ff4757; }
        .section-header { border-left: 4px solid var(--accent); padding-left: 10px; margin-bottom: 15px; font-weight: 800; }
    </style>
</head>
<body>

<div class="bg-white sticky-top shadow-sm p-2 mb-3">
    <ul class="nav nav-pills justify-content-center" id="mainTabs">
        <li class="nav-item"><a class="nav-link active" onclick="showTab('v-clientes', this)">CLIENTES</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showTab('v-cebaderos', this)">CEBADEROS</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showTab('v-visitas', this)">VISITAS</a></li>
        <li class="nav-item"><a class="nav-link" onclick="showTab('v-factura', this)">FACTURACIÓN</a></li>
    </ul>
</div>

<div class="container">
    
    <div id="v-clientes" class="tab-content">
        <div class="card">
            <h6 class="section-header">MAESTRO DE CLIENTES</h6>
            <form id="formClientes" class="row g-2">
                <div class="col-md-2">
                    <label class="form-label">Consecutivo</label>
                    <input type="text" id="c_con" class="form-control readonly-cons" placeholder="Auto" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Nombre Completo</label>
                    <input type="text" id="c_nom" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Cédula / ID</label>
                    <input type="text" id="c_id" class="form-control" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Sucursal</label>
                    <input type="text" id="c_suc" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" id="c_tel" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Email</label>
                    <input type="email" id="c_mail" class="form-control">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Dirección Exacta</label>
                    <input type="text" id="c_dir" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Coordenadas GPS</label>
                    <input type="text" id="c_gps" class="form-control" placeholder="Lat, Lon">
                </div>
                <div class="col-md-3">
                    <label class="form-label text-primary">Fecha Registro</label>
                    <input type="date" id="c_freg" class="form-control" required>
                </div>
                <div class="col-12 mt-3">
                    <button type="button" class="btn btn-dark w-100 fw-bold" onclick="guardarFormulario('Clientes', 'c')">GUARDAR CLIENTE</button>
                </div>
            </form>
        </div>
    </div>

    <div id="v-cebaderos" class="tab-content d-none">
        <div class="card">
            <h6 class="section-header text-success">BASE DE DATOS CEBADEROS</h6>
            <form id="formCebaderos" class="row g-2">
                <div class="col-md-2"><label class="form-label">Consecutivo</label><input type="text" id="ceb_con" class="form-control readonly-cons" readonly></div>
                <div class="col-md-6"><label class="form-label">Cliente</label><select id="ceb_nom" class="form-select select-clientes-lista"></select></div>
                <div class="col-md-4"><label class="form-label">Sucursal</label><input type="text" id="ceb_suc" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Fecha</label><input type="date" id="ceb_fec" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Hora</label><input type="time" id="ceb_hor" class="form-control"></div>
                <div class="col-md-4"><label class="form-label">Técnico</label><input type="text" id="ceb_tec" class="form-control"></div>
                <div class="col-12 mt-3">
                    <button type="button" class="btn btn-success w-100 fw-bold" onclick="alert('Funcionalidad de añadir estaciones en desarrollo estructural')">GUARDAR REPORTE CEBADEROS</button>
                </div>
            </form>
        </div>
    </div>

    <div id="v-visitas" class="tab-content d-none">
        <div class="card">
            <h6 class="section-header text-warning">REGISTRO DE VISITAS TECNICAS</h6>
            <form id="formVisitas" class="row g-2">
                <div class="col-md-2"><label class="form-label">Consecutivo</label><input type="text" id="v_con" class="form-control readonly-cons" readonly></div>
                <div class="col-md-6"><label class="form-label">Cliente</label><select id="v_nom" class="form-select select-clientes-lista"></select></div>
                <div class="col-md-4"><label class="form-label">Sucursal</label><input type="text" id="v_suc" class="form-control"></div>
                <div class="col-12 mt-3">
                    <button type="button" class="btn btn-warning w-100 fw-bold" onclick="guardarFormulario('Visitas', 'v')">REGISTRAR VISITA</button>
                </div>
            </form>
        </div>
    </div>

    <div id="v-factura" class="tab-content d-none">
        <div class="card">
            <h6 class="section-header text-info">MÓDULO DE FACTURACIÓN</h6>
            <form id="formFacturacion" class="row g-2">
                <div class="col-md-3">
                    <label class="form-label">Número de Factura</label>
                    <input type="text" id="f_con" class="form-control readonly-cons" placeholder="Auto" readonly>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-primary fw-bold">Nombre o Razón Social (Leído del Maestro)</label>
                    <select id="f_nom" class="form-select select-clientes-lista" onchange="autoRellenarCamposFactura()"></select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">ID / Cédula Cliente</label>
                    <input type="text" id="f_id" class="form-control" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fecha Emisión</label>
                    <input type="date" id="f_fec" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Método de Pago</label>
                    <select id="f_med" class="form-select">
                        <option>Sinpe</option>
                        <option>Efectivo</option>
                        <option>Transferencia</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Tipo Factura</label>
                    <select id="f_tip" class="form-select">
                        <option>Contado</option>
                        <option>Crédito</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono Contacto</label>
                    <input type="text" id="f_tel" class="form-control" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Lugar de Servicio</label>
                    <input type="text" id="f_lug" class="form-control">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Dirección de Envío</label>
                    <input type="text" id="f_dir" class="form-control" readonly>
                </div>
                
                <hr class="my-3">
                
                <div class="col-md-2">
                    <label class="form-label">Cantidad</label>
                    <input type="number" id="f_can" class="form-control" value="1" oninput="calcularMontosFactura()">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Precio Unitario (₡)</label>
                    <input type="number" id="f_pre" class="form-control" placeholder="0.00" oninput="calcularMontosFactura()">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Subtotal</label>
                    <input type="text" id="f_sub" class="form-control bg-light" readonly>
                </div>
                <div class="col-md-2">
                    <label class="form-label">IVA (13%)</label>
                    <input type="text" id="f_iva" class="form-control bg-light" readonly>
                </div>
                <div class="col-md-2">
                    <label class="form-label text-danger fw-bold">TOTAL FACTURA</label>
                    <input type="text" id="f_tot" class="form-control fw-bold bg-warning-subtle" readonly>
                </div>
                
                <div class="col-12 mt-4">
                    <button type="button" class="btn btn-info w-100 fw-bold text-white" onclick="guardarFormulario('Facturacion', 'f')">REGISTRAR FACTURACIÓN</button>
                </div>
            </form>
        </div>
    </div>

</div>

<script>
    // URL Única de Conexión de Google Apps Script suministrada
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3l9ZT-P3takIBvyk5YJ7aP7gVskOLeym57Slm4ekgM1ypi-BeQAqg9JYzrb23Zlno/exec";
    let baseClientes = [];

    // Cambiar dinámicamente entre pestañas
    function showTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.add('d-none'));
        document.getElementById(tabId).classList.remove('d-none');
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // Cargar la base de clientes desde Google Sheets en tiempo real
    function precargarClientesMaster() {
        console.log("Conectando con Google Sheets para descargar maestro de clientes...");
        
        fetch(SCRIPT_URL)
            .then(res => {
                if (!res.ok) throw new Error("Error en respuesta HTTP.");
                return res.json();
            })
            .then(data => {
                baseClientes = data;
                console.log("Clientes cargados:", baseClientes.length);
                
                // Buscar todos los selectores de cliente del documento
                const selectores = document.querySelectorAll('.select-clientes-lista');
                selectores.forEach(select => {
                    select.innerHTML = '<option value="">Seleccione un cliente de la lista...</option>';
                    data.forEach(c => {
                        let op = document.createElement('option');
                        op.value = c.nombre;
                        op.textContent = c.nombre;
                        // Metadatos ocultos para auto-rellenar campos derivados
                        op.dataset.cedula = c.id;
                        op.dataset.telefono = c.tel;
                        op.dataset.direccion = c.dir;
                        op.dataset.sucursal = c.suc;
                        select.appendChild(op);
                    });
                });
            })
            .catch(err => {
                console.error("Fallo crítico al sincronizar clientes:", err);
                alert("Error de conexión o permisos en Google Script. Asegúrese de que la App de Google esté pública para 'Cualquiera'.");
            });
    }

    // Auto-rellenar campos en la factura en base al cliente seleccionado
    function autoRellenarCamposFactura() {
        const selector = document.getElementById("f_nom");
        const opcion = selector.options[selector.selectedIndex];
        
        if(opcion && opcion.value !== "") {
            document.getElementById("f_id").value = opcion.dataset.cedula || "";
            document.getElementById("f_tel").value = opcion.dataset.telefono || "";
            document.getElementById("f_dir").value = opcion.dataset.direccion || "";
            document.getElementById("f_lug").value = opcion.dataset.sucursal || "";
        } else {
            document.getElementById("f_id").value = "";
            document.getElementById("f_tel").value = "";
            document.getElementById("f_dir").value = "";
            document.getElementById("f_lug").value = "";
        }
    }

    // Cálculos matemáticos en la pestaña de facturas
    function calcularMontosFactura() {
        const cant = parseFloat(document.getElementById("f_can").value) || 0;
        const precio = parseFloat(document.getElementById("f_pre").value) || 0;
        
        const subtotal = cant * precio;
        const iva = subtotal * 0.13;
        const total = subtotal + iva;
        
        document.getElementById("f_sub").value = subtotal.toFixed(2);
        document.getElementById("f_iva").value = iva.toFixed(2);
        document.getElementById("f_tot").value = total.toFixed(2);
    }

    // Función Universal de Envío (Clientes, Visitas, Facturación)
    function guardarFormulario(pestana, prefijo) {
        const form = document.getElementById(`form${pestana === 'Facturacion' ? 'Facturacion' : pestana}`);
        
        // Empaquetar dinámicamente los datos de los inputs del formulario
        let datos = {};
        const inputs = form.querySelectorAll("input, select, textarea");
        inputs.forEach(i => {
            if(i.id) datos[i.id] = i.value;
        });

        // Enviar a Apps Script mediante POST JSON estructurado
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ pestana: pestana, datos: datos })
        })
        .then(() => {
            alert(`¡Registro en '${pestana}' guardado exitosamente en Google Sheets!`);
            form.reset();
            if(pestana === "Clientes") precargarClientesMaster(); // Refrescar listas inmediatamente
        })
        .catch(err => {
            console.error("Error al guardar:", err);
            alert("No se pudo conectar a la base de datos.");
        });
    }

    // Inicialización automática de la App al cargar el DOM
    document.addEventListener("DOMContentLoaded", () => {
        // Fijar fecha de hoy automáticamente por defecto en registros
        const hoy = new Date().toISOString().split('T')[0];
        if(document.getElementById("c_freg")) document.getElementById("c_freg").value = hoy;
        if(document.getElementById("f_fec")) document.getElementById("f_fec").value = hoy;
        
        precargarClientesMaster();
    });
</script>

</body>
</html>
