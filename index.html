<div id="v-factura" class="tab-content d-none">

<div class="col-md-6"><label class="form-label">Nombre del Cliente</label><select id="f_nom" class="form-select select-clientes" onchange="autoFillFact()"></select></div>
<div class="col-md-3"><label class="form-label">ID Cliente</label><input type="text" id="f_id" class="form-control" readonly></div>
<div class="col-md-4"><label class="form-label">Fecha Factura</label><input type="date" id="f_fec" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Medio de Pago</label><select id="f_med" class="form-select"><option>Sinpe</option><option>Efectivo</option><option>Transferencia</option></select></div>
<div class="col-md-4"><label class="form-label">Tipo de Factura</label><select id="f_tip" class="form-select"><option>Contado</option><option>Crédito</option></select></div>
<div class="col-md-6"><label class="form-label">Teléfono</label><input type="text" id="f_tel" class="form-control" readonly></div>
<div class="col-md-6"><label class="form-label">Lugar</label><input type="text" id="f_lug" class="form-control"></div>
<div class="col-md-12"><label class="form-label">Dirección</label><input type="text" id="f_dir" class="form-control" readonly></div>
<div class="col-md-3"><label class="form-label">Cantidad</label><input type="number" id="f_can" class="form-control" value="1" oninput="calcTotal()"></div>
<div class="col-md-3"><label class="form-label">Precio Unitario</label><input type="number" id="f_pre" class="form-control" oninput="calcTotal()"></div>
<div class="col-md-2"><label class="form-label">IVA (13%)</label><input type="text" id="f_iva" class="form-control" readonly></div>
<div class="col-md-2"><label class="form-label">Sub Total</label><input type="text" id="f_sub" class="form-control" readonly></div>
<div class="col-md-2"><label class="form-label text-primary fw-bold">TOTAL</label><input type="text" id="f_tot" class="form-control fw-bold bg-light" readonly></div>

<script>
// URL Vinculada de tu Google Apps Script activa
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx3l9ZT-P3takIBvyk5YJ7aP7gVskOLeym57Slm4ekgM1ypi-BeQAqg9JYzrb23Zlno/exec";
let estacionesTemp = [];

function showTab(id, link) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.add('d-none'));
    document.getElementById(id).classList.remove('d-none');
    document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
    link.classList.add('active');
}

// CORRECCIÓN CLAVE: Carga de Clientes mapeando correctamente la Columna B
function cargarClientes() {
    fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            const selectores = document.querySelectorAll(".select-clientes");
            selectores.forEach(select => {
                select.innerHTML = '<option value="">Seleccione un cliente...</option>';
                data.forEach(c => {
                    let option = document.createElement("option");
                    option.value = c.nombre; // Columna B de tu tabla (Nombre Completo)
                    option.textContent = c.nombre;
                    // Guardamos metadatos adicionales para el auto-relleno automático
                    option.dataset.cedula = c.id || "";
                    option.dataset.telefono = c.tel || "";
                    option.dataset.direccion = c.loc || "";
                    option.dataset.sucursal = c.suc || "";
                    select.appendChild(option);
                });
            });
        })
        .catch(err => console.error("Error cargando maestro de clientes:", err));
}

// Auto-relleno inteligente al cambiar de cliente en Facturación
function autoFillFact() {
    const sel = document.getElementById("f_nom");
    const opt = sel.options[sel.selectedIndex];
    if(opt && opt.value !== "") {
        document.getElementById("f_id").value = opt.dataset.cedula;
        document.getElementById("f_tel").value = opt.dataset.telefono;
        document.getElementById("f_dir").value = opt.dataset.direccion;
        document.getElementById("f_lug").value = opt.dataset.sucursal;
    } else {
        document.getElementById("f_id").value = "";
        document.getElementById("f_tel").value = "";
        document.getElementById("f_dir").value = "";
        document.getElementById("f_lug").value = "";
    }
}

function calcTotal() {
    let cant = parseFloat(document.getElementById("f_can").value) || 0;
    let pre = parseFloat(document.getElementById("f_pre").value) || 0;
    let sub = cant * pre;
    let iva = sub * 0.13;
    let tot = sub + iva;
    document.getElementById("f_sub").value = sub.toFixed(2);
    document.getElementById("f_iva").value = iva.toFixed(2);
    document.getElementById("f_tot").value = tot.toFixed(2);
}

function addEstacion() {
    let num = document.getElementById("i_est").value;
    let pro = document.getElementById("i_pro").value;
    let inc = document.getElementById("i_inc").value;
    let com = document.getElementById("i_com").value;
    if(!num) return alert("Número de estación requerido");
    estacionesTemp.push({num, pro, inc, com});
    renderEstaciones();
    document.getElementById("i_est").value = "";
    document.getElementById("i_com").value = "";
}

function renderEstaciones() {
    let tbody = document.getElementById("lista_estaciones");
    tbody.innerHTML = "";
    estacionesTemp.forEach((e, idx) => {
        tbody.innerHTML += `<tr><td>${e.num}</td><td>${e.pro}</td><td>${e.inc}</td><td><button class='btn btn-danger btn-sm' onclick='removeEstacion(${idx})'>X</button></td></tr>`;
    });
}

function removeEstacion(idx) {
    estacionesTemp.splice(idx, 1);
    renderEstaciones();
}

function getSelectValues(select) {
    var result = [];
    var options = select && select.options;
    var opt;
    for (var i=0, iLen=options.length; i<iLen; i++) {
        opt = options[i];
        if (opt.selected) {
            result.push(opt.value || opt.text);
        }
    }
    return result.join(", ");
}

function guardarGeneral(pestana, prefijo) {
    let datos = {};
    // Captura inputs estándar de texto, número, fecha
    let inputs = document.querySelectorAll(`[id^="${prefijo}_"]`);
    inputs.forEach(i => {
        if(i.tagName === "SELECT" && i.multiple) {
            datos[i.id] = getSelectValues(i);
        } else {
            datos[i.id] = i.value;
        }
    });

    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({pestana: pestana, datos: datos})
    })
    .then(() => {
        alert("Registro procesado correctamente");
        inputs.forEach(i => { if(i.id !== `${prefijo}_con`) i.value = ""; });
        if(pestana === "Clientes") cargarClientes();
    })
    .catch(err => alert("Error al guardar: " + err));
}

function guardarCebaderos() {
    let datos = {
        ceb_con: document.getElementById("ceb_con").value,
        ceb_nom: document.getElementById("ceb_nom").value,
        ceb_suc: document.getElementById("ceb_suc").value,
        ceb_fec: document.getElementById("ceb_fec").value,
        ceb_hor: document.getElementById("ceb_hor").value,
        ceb_tip: document.getElementById("ceb_tip").value,
        ceb_tec: document.getElementById("ceb_tec").value,
        estaciones: JSON.stringify(estacionesTemp)
    };
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({pestana: "Cebaderos", datos: datos})
    })
    .then(() => {
        alert("Reporte de cebaderos guardado con éxito");
        estacionesTemp = [];
        renderEstaciones();
        document.getElementById("ceb_suc").value = "";
    })
    .catch(err => alert("Error: " + err));
}

document.addEventListener("DOMContentLoaded", () => {
    // Establecer fechas actuales por defecto
    let hoy = new Date().toISOString().split('T')[0];
    if(document.getElementById("c_freg")) document.getElementById("c_freg").value = hoy;
    if(document.getElementById("ceb_fec")) document.getElementById("ceb_fec").value = hoy;
    if(document.getElementById("v_fec")) document.getElementById("v_fec").value = hoy;
    if(document.getElementById("f_fec")) document.getElementById("f_fec").value = hoy;
    
    // Ejecuta la lectura inicial de clientes
    cargarClientes();
});
</script>
</body>
